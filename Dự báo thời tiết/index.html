<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thời tiết</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>

<body>

<h2>🌤️ Thời tiết</h2>

<input id="search-input" placeholder="Nhập tỉnh thành..." />
<button onclick="doSearch()">Tìm</button>

<h3 id="city">TP.HCM</h3>
<p>Nhiệt độ: <span id="temp">--</span> °C</p>
<p>Mô tả: <span id="desc">--</span></p>
<p>Độ ẩm: <span id="humidity">--</span>%</p>

<h3>Dự báo</h3>
<div id="forecast"></div>

<div id="map" style="height:400px;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
var API_KEY = "16a6926b0138cecb7c6788782d764c26";

var map = L.map('map').setView([10.8231,106.6297], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var marker = L.marker([10.8231,106.6297]).addTo(map);

// ===== WEATHER =====
function fetchWeather(lat, lon){
  fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=vi`)
  .then(r=>r.json())
  .then(d=>{
    if(d.cod !== 200){
      alert("Lỗi: " + d.message);
      return;
    }

    document.getElementById('temp').textContent = Math.round(d.main.temp);
    document.getElementById('desc').textContent = d.weather[0].description;
    document.getElementById('humidity').textContent = d.main.humidity;
  })
  .catch(()=>alert("Lỗi kết nối"));
}

// ===== FORECAST =====
function fetchForecast(lat, lon){
  fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=vi`)
  .then(r=>r.json())
  .then(data=>{
    if(data.cod !== "200"){
      alert("Lỗi forecast");
      return;
    }

    let html="";
    data.list.slice(0,5).forEach(item=>{
      html += `<p>${item.dt_txt}: ${Math.round(item.main.temp)}°C</p>`;
    });

    document.getElementById('forecast').innerHTML = html;
  })
  .catch(()=>alert("Lỗi forecast"));
}

// ===== MOVE MAP =====
function goTo(lat, lon, name){
  map.setView([lat,lon], 10);
  marker.setLatLng([lat,lon]);

  document.getElementById('city').textContent = name;

  fetchWeather(lat,lon);
  fetchForecast(lat,lon);
}

// ===== SEARCH =====
function doSearch(){
  let q = document.getElementById('search-input').value;

  if(!q){
    alert("Nhập địa điểm!");
    return;
  }

  fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${q},Vietnam&limit=1&appid=${API_KEY}`)
  .then(r=>r.json())
  .then(data=>{
    if(data.length === 0){
      alert("Không tìm thấy!");
      return;
    }

    let p = data[0];
    goTo(p.lat, p.lon, p.name);
  })
  .catch(()=>alert("Lỗi tìm kiếm"));
}

// ===== CLICK MAP =====
map.on('click', function(e){
  goTo(e.latlng.lat, e.latlng.lng, "Vị trí đã chọn");
});

// ===== LOAD MẶC ĐỊNH =====
goTo(10.8231,106.6297,"TP.HCM");

</script>

</body>
</html>
